<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Keyboard</title>
<style>
  :root {
    --bg: #0a0a14;
    --panel: #14142400;
    --accent: #7c5cff;
    --accent2: #00e0c6;
    --text: #e8e8f0;
    --muted: #8a8aa0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: radial-gradient(ellipse at top, #1a1a35 0%, var(--bg) 60%);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    overflow-x: hidden;
    overflow-y: auto;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 22px;
    padding: 24px 20px 40px;
  }
  h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .controls {
    display: flex;
    gap: 18px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    background: rgba(255,255,255,0.03);
    padding: 14px 22px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .ctrl { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .ctrl label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  select, .btn {
    background: #1c1c30;
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
    cursor: pointer;
    outline: none;
  }
  .btn.active { background: var(--accent); border-color: var(--accent); }
  input[type=range] { width: 110px; accent-color: var(--accent); cursor: pointer; }
  .octave-display { font-size: 18px; font-weight: 600; min-width: 32px; text-align: center; }
  canvas#scope {
    width: 100%;
    max-width: 820px;
    height: 90px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .piano {
    position: relative;
    display: flex;
    height: 200px;
    max-width: 820px;
    width: 100%;
    padding: 0 4px;
  }
  .key {
    position: relative;
    flex: 1;
    border-radius: 0 0 8px 8px;
    cursor: pointer;
    transition: transform 0.04s, background 0.08s;
  }
  .key.white {
    background: linear-gradient(180deg, #f4f4fa, #d8d8e6);
    border: 1px solid #aaa;
    margin: 0 1px;
    z-index: 1;
  }
  .key.black {
    position: absolute;
    width: 5.2%;
    height: 62%;
    background: linear-gradient(180deg, #2a2a3a, #08080f);
    border: 1px solid #000;
    z-index: 2;
    border-radius: 0 0 6px 6px;
  }
  .key.active {
    transform: translateY(3px);
    filter: brightness(1.1);
  }
  .key.white.active { background: linear-gradient(180deg, #c8b8ff, #a890ff); }
  .key.black.active { background: linear-gradient(180deg, #9c7cff, #6c4cef); }
  .keylabel {
    position: absolute;
    bottom: 8px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    pointer-events: none;
  }
  .key.white .keylabel { color: #66667a; }
  .key.black .keylabel { color: #aaaac0; bottom: 6px; }
  .note-name { font-size: 9px; opacity: 0.6; display: block; }
  .hint { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.6; }
  kbd {
    background: #1c1c30;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
  }
</style>
</head>
<body>
  <h1>VIBE KEYBOARD</h1>

  <div class="controls">
    <div class="ctrl">
      <label>音色</label>
      <select id="timbre">
        <option value="epiano">电钢琴</option>
        <option value="sine">正弦 (柔和)</option>
        <option value="triangle">三角波</option>
        <option value="square">方波 (复古)</option>
        <option value="sawtooth">锯齿波 (明亮)</option>
        <option value="organ">管风琴</option>
      </select>
    </div>
    <div class="ctrl">
      <label>八度</label>
      <div style="display:flex;gap:6px;align-items:center;">
        <button class="btn" id="octDown">−</button>
        <span class="octave-display" id="octVal">4</span>
        <button class="btn" id="octUp">+</button>
      </div>
    </div>
    <div class="ctrl">
      <label>音量</label>
      <input type="range" id="volume" min="0" max="100" value="55">
    </div>
    <div class="ctrl">
      <label>混响</label>
      <input type="range" id="reverb" min="0" max="100" value="25">
    </div>
    <div class="ctrl">
      <label>延音 (空格)</label>
      <button class="btn" id="sustain">关</button>
    </div>
  </div>

  <canvas id="scope"></canvas>

  <div class="piano" id="piano"></div>

  <div class="hint">
    白键 <kbd>A</kbd><kbd>S</kbd><kbd>D</kbd><kbd>F</kbd><kbd>G</kbd><kbd>H</kbd><kbd>J</kbd><kbd>K</kbd> ·
    黑键 <kbd>W</kbd><kbd>E</kbd><kbd>T</kbd><kbd>Y</kbd><kbd>U</kbd> ·
    切换八度 <kbd>Z</kbd>/<kbd>X</kbd> · 延音 <kbd>空格</kbd><br>
    点击或触摸琴键也能弹奏
  </div>

<script>
(() => {
  "use strict";

  // ---- Audio graph ----
  let ac = null;
  let masterGain, compressor, analyser, dryGain, wetGain, convolver;
  const active = new Map(); // noteId -> { osc[], gain, ... }

  function initAudio() {
    if (ac) return;
    ac = new (window.AudioContext || window.webkitAudioContext)();

    compressor = ac.createDynamicsCompressor();
    masterGain = ac.createGain();
    masterGain.gain.value = volSlider.value / 100;

    analyser = ac.createAnalyser();
    analyser.fftSize = 2048;

    // reverb (algorithmic impulse response)
    convolver = ac.createConvolver();
    convolver.buffer = buildImpulse(2.2, 2.5);
    dryGain = ac.createGain();
    wetGain = ac.createGain();
    setReverbMix(revSlider.value / 100);

    // routing: voices -> masterGain -> [dry, convolver->wet] -> compressor -> analyser -> dest
    masterGain.connect(dryGain);
    masterGain.connect(convolver);
    convolver.connect(wetGain);
    dryGain.connect(compressor);
    wetGain.connect(compressor);
    compressor.connect(analyser);
    analyser.connect(ac.destination);

    // visualization must never break sound — isolate it
    try { drawScope(); } catch (e) { console.warn("scope disabled:", e); }
  }

  function buildImpulse(seconds, decay) {
    const rate = (ac.sampleRate) || 44100;
    const len = Math.floor(rate * seconds);
    const buf = ac.createBuffer(2, len, rate);
    for (let ch = 0; ch < 2; ch++) {
      const data = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
      }
    }
    return buf;
  }

  function setReverbMix(mix) {
    if (!ac) return;
    wetGain.gain.value = mix;
    dryGain.gain.value = 1 - mix * 0.5;
  }

  // ---- Note frequency ----
  function freq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

  // ---- Voice creation per timbre ----
  function noteOn(midi, id) {
    initAudio();
    if (ac.state === "suspended") ac.resume();
    if (active.has(id)) return;

    const t = ac.currentTime;
    const timbre = timbreSel.value;
    const g = ac.createGain();
    g.gain.value = 0;
    g.connect(masterGain);

    const oscs = [];
    const f = freq(midi);
    let peak = 0.32, attack = 0.01, decay = 0.25, sustainLvl = 0.55, isPercussive = false;

    function makeOsc(type, frequency, detune, gainVal) {
      const o = ac.createOscillator();
      o.type = type;
      o.frequency.value = frequency;
      if (detune) o.detune.value = detune;
      const og = ac.createGain();
      og.gain.value = gainVal;
      o.connect(og); og.connect(g);
      o.start(t);
      oscs.push(o);
    }

    if (timbre === "epiano") {
      makeOsc("sine", f, 0, 1.0);
      makeOsc("sine", f * 2, 0, 0.35);      // harmonic shimmer
      makeOsc("triangle", f, 4, 0.25);
      attack = 0.005; decay = 1.6; sustainLvl = 0.0; isPercussive = true; peak = 0.4;
    } else if (timbre === "organ") {
      makeOsc("sine", f, 0, 0.7);
      makeOsc("sine", f * 2, 0, 0.4);
      makeOsc("sine", f * 3, 0, 0.25);
      makeOsc("sine", f * 4, 0, 0.15);
      attack = 0.02; decay = 0.1; sustainLvl = 0.8; peak = 0.3;
    } else {
      // basic waveforms with a tiny detuned layer for warmth
      makeOsc(timbre, f, -6, 0.6);
      makeOsc(timbre, f, 6, 0.6);
      attack = 0.012; decay = 0.3; sustainLvl = 0.5;
      peak = timbre === "sawtooth" || timbre === "square" ? 0.18 : 0.28;
    }

    // ADSR
    g.gain.cancelScheduledValues(t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(peak, t + attack);
    if (isPercussive) {
      g.gain.exponentialRampToValueAtTime(0.001, t + attack + decay);
    } else {
      g.gain.linearRampToValueAtTime(peak * sustainLvl, t + attack + decay);
    }

    active.set(id, { oscs, gain: g, isPercussive });
    setKeyVisual(id, true);
  }

  function noteOff(id) {
    const v = active.get(id);
    if (!v) return;
    setKeyVisual(id, false);
    if (sustainOn) { sustained.add(id); return; }
    releaseVoice(id, v);
  }

  function releaseVoice(id, v) {
    const t = ac.currentTime;
    const release = 0.35;
    if (!v.isPercussive) {
      v.gain.gain.cancelScheduledValues(t);
      v.gain.gain.setValueAtTime(v.gain.gain.value, t);
      v.gain.gain.linearRampToValueAtTime(0.0001, t + release);
    }
    const stopAt = v.isPercussive ? t + 2.0 : t + release + 0.05;
    v.oscs.forEach(o => { try { o.stop(stopAt); } catch (e) {} });
    active.delete(id);
  }

  // ---- Sustain pedal ----
  let sustainOn = false;
  const sustained = new Set();
  function setSustain(on) {
    sustainOn = on;
    sustainBtn.textContent = on ? "开" : "关";
    sustainBtn.classList.toggle("active", on);
    if (!on) {
      sustained.forEach(id => {
        const v = active.get(id);
        if (v && !keyHeld.has(id)) releaseVoice(id, v);
      });
      sustained.clear();
    }
  }

  // ---- Keyboard layout ----
  // semitone offset from base C of current octave
  const KEY_MAP = {
    a: 0, w: 1, s: 2, e: 3, d: 4, f: 5, t: 6,
    g: 7, y: 8, h: 9, u: 10, j: 11, k: 12,
    o: 13, l: 14, p: 15, ";": 16
  };
  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

  // ---- Build piano UI ----
  const piano = document.getElementById("piano");
  let octave = 4;
  const keyHeld = new Set(); // ids physically held (key or pointer)
  const keyEls = new Map();  // id -> element

  // Which of the 17 semitone slots are black keys
  const BLACK = new Set([1, 3, 6, 8, 10, 13, 15]);
  const LABELS = { 0:"A",1:"W",2:"S",3:"E",4:"D",5:"F",6:"T",7:"G",8:"Y",9:"H",10:"U",11:"J",12:"K",13:"O",14:"L",15:"P",16:";" };

  function midiFor(offset) { return 12 * (octave + 1) + offset; } // C-1 = 0

  function buildPiano() {
    piano.innerHTML = "";
    keyEls.clear();
    // first render white keys to establish flex layout
    const whiteOffsets = [];
    for (let o = 0; o <= 16; o++) if (!BLACK.has(o)) whiteOffsets.push(o);

    whiteOffsets.forEach(off => {
      const el = document.createElement("div");
      el.className = "key white";
      el.dataset.offset = off;
      const midi = midiFor(off);
      el.innerHTML = `<span class="keylabel">${LABELS[off] || ""}<span class="note-name">${noteLabel(midi)}</span></span>`;
      attachPointer(el, off);
      piano.appendChild(el);
      keyEls.set("k" + off, el);
    });

    // black keys positioned relative to white-key grid
    const whiteCount = whiteOffsets.length;
    const whiteW = 100 / whiteCount;
    let whiteIndex = 0;
    for (let o = 0; o <= 16; o++) {
      if (BLACK.has(o)) {
        const el = document.createElement("div");
        el.className = "key black";
        el.dataset.offset = o;
        const midi = midiFor(o);
        el.innerHTML = `<span class="keylabel">${LABELS[o] || ""}</span>`;
        // place between previous and current white key
        el.style.left = `calc(${whiteIndex * whiteW}% - 2.6%)`;
        attachPointer(el, o);
        piano.appendChild(el);
        keyEls.set("k" + o, el);
      } else {
        whiteIndex++;
      }
    }
  }

  function noteLabel(midi) {
    return NOTE_NAMES[midi % 12] + (Math.floor(midi / 12) - 1);
  }

  function attachPointer(el, offset) {
    const id = "k" + offset;
    el.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      keyHeld.add(id);
      noteOn(midiFor(offset), id);
    });
    const up = () => { if (keyHeld.has(id)) { keyHeld.delete(id); noteOff(id); } };
    el.addEventListener("pointerup", up);
    el.addEventListener("pointerleave", (e) => { if (e.buttons) up(); });
    el.addEventListener("pointercancel", up);
  }

  function setKeyVisual(id, on) {
    const el = keyEls.get(id);
    if (el) el.classList.toggle("active", on);
  }

  // ---- Physical keyboard ----
  window.addEventListener("keydown", (e) => {
    if (e.repeat) return;
    const k = e.key.toLowerCase();
    if (k === "z") { changeOctave(-1); return; }
    if (k === "x") { changeOctave(1); return; }
    if (k === " ") { e.preventDefault(); setSustain(!sustainOn); return; }
    if (k in KEY_MAP) {
      e.preventDefault();
      const off = KEY_MAP[k];
      const id = "k" + off;
      keyHeld.add(id);
      noteOn(midiFor(off), id);
    }
  });
  window.addEventListener("keyup", (e) => {
    const k = e.key.toLowerCase();
    if (k in KEY_MAP) {
      const id = "k" + KEY_MAP[k];
      keyHeld.delete(id);
      noteOff(id);
    }
  });

  function changeOctave(d) {
    // release everything to avoid stuck notes
    Array.from(active.keys()).forEach(id => { keyHeld.delete(id); noteOff(id); });
    octave = Math.max(0, Math.min(8, octave + d));
    octVal.textContent = octave;
    buildPiano();
  }

  // ---- Controls ----
  const timbreSel = document.getElementById("timbre");
  const volSlider = document.getElementById("volume");
  const revSlider = document.getElementById("reverb");
  const sustainBtn = document.getElementById("sustain");
  const octVal = document.getElementById("octVal");
  document.getElementById("octUp").onclick = () => changeOctave(1);
  document.getElementById("octDown").onclick = () => changeOctave(-1);
  sustainBtn.onclick = () => setSustain(!sustainOn);
  volSlider.oninput = () => { if (masterGain) masterGain.gain.value = volSlider.value / 100; };
  revSlider.oninput = () => setReverbMix(revSlider.value / 100);

  // ---- Oscilloscope ----
  const canvas = document.getElementById("scope");
  const ctx = canvas.getContext("2d");
  function resizeCanvas() {
    const r = canvas.getBoundingClientRect();
    canvas.width = r.width * devicePixelRatio;
    canvas.height = r.height * devicePixelRatio;
  }
  window.addEventListener("resize", resizeCanvas);

  function drawScope() {
    if (!ctx) return; // no canvas context -> skip visualization, sound still works
    const buf = new Uint8Array(analyser.fftSize);
    function frame() {
      analyser.getByteTimeDomainData(buf);
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.lineWidth = 2 * devicePixelRatio;
      const grad = ctx.createLinearGradient(0, 0, w, 0);
      grad.addColorStop(0, "#7c5cff");
      grad.addColorStop(1, "#00e0c6");
      ctx.strokeStyle = grad;
      ctx.beginPath();
      const slice = w / buf.length;
      let x = 0;
      for (let i = 0; i < buf.length; i++) {
        const y = (buf[i] / 128.0) * (h / 2);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        x += slice;
      }
      ctx.stroke();
      requestAnimationFrame(frame);
    }
    resizeCanvas();
    frame();
  }

  // ---- Init ----
  octVal.textContent = octave;
  buildPiano();
})();
</script>
</body>
</html>
